name: AI Review: Header Component

on:
  pull_request:
    paths:
      - 'header/**'
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed header files
        id: changes
        run: |
          FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} | grep '^header/' || true)
          if [ -z "$FILES" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "has_changes=true" >> $GITHUB_OUTPUT
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run AI Code Review
        if: steps.changes.outputs.has_changes == 'true'
        id: review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FILES="${{ steps.changes.outputs.files }}"
          
          # Установка jq если нужно
          if ! command -v jq &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y jq
          fi
          
          # Формируем контент
          CONTENT="Проверь изменения в файлах Header компонента:"
          while IFS= read -r FILE; do
            if [ -f "$FILE" ]; then
              EXT="${FILE##*.}"
              CONTENT="$CONTENT"$'\n'"### 📄 $FILE"$'\n'"\`\`\`$EXT"$'\n'"$(cat "$FILE")"$'\n'"\`\`\`"
            fi
          done <<< "$FILES"

          # API запрос к GitHub Models
          RESPONSE=$(curl -s -X POST https://api.github.com/models/endpoints/github-gpt-4-turbo/chat/completions \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            --data-binary @- << 'PAYLOAD'
          {
            "model": "gpt-4-turbo",
            "messages": [
              {
                "role": "system",
                "content": "Ты опытный разработчик и эксперт по фронтенд-архитектуре. Анализируй код Header компонента. Проверь качество кода, семантику HTML, доступность (a11y), производительность, безопасность. Предложи конкретные улучшения. Будь конструктивен."
              },
              {
                "role": "user",
                "content": "$CONTENT"
              }
            ],
            "temperature": 0.2,
            "max_tokens": 1000
          }
          PAYLOAD
          )
          
          # Парсим ответ
          REVIEW=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty' 2>/dev/null)
          
          if [ -z "$REVIEW" ]; then
            REVIEW="⚠️ Ошибка при получении ответа ИИ"
          fi
          
          {
            echo "review<<EOF"
            echo "$REVIEW"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Post review comment to PR
        if: steps.review.outputs.review != '' && steps.review.outputs.review != '⚠️ Ошибка при получении ответа ИИ'
        uses: actions/github-script@v7
        with:
          script: |
            const review = `${{ steps.review.outputs.review }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `🤖 **AI Review: Header Component**\n\n${review}\n\n---\n📦 _Powered by GitHub Models_`
            });
